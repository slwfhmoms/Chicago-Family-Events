<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-info: #e6f1fb;
    --bg-success: #eaf3de;
    --bg-warning: #faeeda;
    --bg-danger: #fcebeb;
    --text: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --text-info: #185fa5;
    --text-success: #3b6d11;
    --text-warning: #854f0b;
    --text-danger: #a32d2d;
    --border: rgba(0,0,0,0.12);
    --border-med: rgba(0,0,0,0.22);
    --border-info: #378add;
    --border-success: #639922;
    --border-warning: #ba7517;
    --border-danger: #e24b4a;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-pill: 20px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg-secondary: #2a2a28;
      --bg-info: #042c53;
      --bg-success: #173404;
      --bg-warning: #412402;
      --bg-danger: #501313;
      --text: #f0efeb;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --text-info: #85b7eb;
      --text-success: #97c459;
      --text-warning: #ef9f27;
      --text-danger: #f09595;
      --border: rgba(255,255,255,0.12);
      --border-med: rgba(255,255,255,0.22);
    }
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; padding: 0 1rem; max-width: 960px; margin: 0 auto; }
  .header { padding: 1.75rem 0 1rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; }
  .header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .header h1 { font-size: 22px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .header p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  button, .btn { font-family: var(--font); font-size: 13px; padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border-med); background: var(--bg); color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s; text-decoration: none; white-space: nowrap; }
  button:hover, .btn:hover { background: var(--bg-secondary); }
  .btn-export { background: var(--bg-success); color: var(--text-success); border-color: var(--border-success); font-weight: 500; }
  .btn-export:hover { opacity: 0.88; background: var(--bg-success); }
  .url-bar, .ai-bar { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 0.85rem 1.1rem; margin-bottom: 1rem; display: flex; gap: 10px; align-items: center; }
  input[type=text], select { font-family: var(--font); font-size: 14px; padding: 7px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border-med); background: var(--bg); color: var(--text); outline: none; }
  input[type=text]:focus { border-color: var(--border-info); box-shadow: 0 0 0 2px rgba(55,138,221,0.15); }
  .url-bar input, .ai-bar input { flex: 1; }
  .icon { font-size: 18px; color: var(--text-secondary); flex-shrink: 0; }
  .controls { display: flex; gap: 6px; margin-bottom: 0.75rem; flex-wrap: wrap; align-items: center; }
  .filter-btn { font-size: 12px; padding: 5px 13px; border-radius: var(--radius-pill); border: 0.5px solid var(--border-med); background: var(--bg); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
  .filter-btn.active-all   { background: var(--bg-info);    color: var(--text-info);    border-color: var(--border-info); }
  .filter-btn.active-athletic, .filter-btn.active-festival { background: var(--bg-warning); color: var(--text-warning); border-color: var(--border-warning); }
  .filter-btn.active-market, .filter-btn.active-nature { background: var(--bg-success); color: var(--text-success); border-color: var(--border-success); }
  .filter-btn.active-civic, .filter-btn.active-cultural { background: var(--bg-danger); color: var(--text-danger); border-color: var(--border-danger); }
  .filter-btn.active-entertainment, .filter-btn.active-arts { background: var(--bg-info); color: var(--text-info); border-color: var(--border-info); }
  .filter-btn.active-free { background: var(--bg-secondary); color: var(--text); border-color: var(--border-med); font-weight: 500; }
  .second-row { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .neighborhood-wrap { position: relative; display: inline-flex; align-items: center; }
  .neighborhood-wrap select { padding: 6px 30px 6px 32px; font-size: 13px; border-radius: var(--radius-pill); appearance: none; -webkit-appearance: none; min-width: 170px; cursor: pointer; }
  .neighborhood-wrap select.active-filter { border-color: var(--border-info); background: var(--bg-info); color: var(--text-info); }
  .map-icon { position: absolute; left: 10px; font-size: 15px; color: var(--text-secondary); pointer-events: none; }
  .chev-icon { position: absolute; right: 10px; font-size: 13px; color: var(--text-secondary); pointer-events: none; }
  .results-count { font-size: 12px; color: var(--text-tertiary); }
  .search-wrap { margin-left: auto; position: relative; }
  .search-wrap input { padding: 6px 10px 6px 30px; font-size: 13px; border-radius: var(--radius-pill); width: 200px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text-tertiary); pointer-events: none; }
  .legend { display: flex; gap: 14px; font-size: 11px; color: var(--text-tertiary); margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .dot { width: 12px; height: 12px; border-radius: 3px; border: 1px solid var(--border-med); flex-shrink: 0; }
  .dot-eb { border-left: 3px solid var(--border-info); }
  .dot-scraped { border-left: 3px solid var(--border-success); }
  .status-bar { font-size: 12px; color: var(--text-tertiary); min-height: 24px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; padding-bottom: 2rem; }
  .event-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 0.9rem 1.1rem; display: flex; flex-direction: column; gap: 7px; transition: border-color 0.15s; }
  .event-card:hover { border-color: var(--border-med); }
  .event-card.eb-card { border-left: 2.5px solid var(--border-info); }
  .event-card.scraped-card { border-left: 2.5px solid var(--border-success); }
  .event-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .event-name { font-size: 14px; font-weight: 500; line-height: 1.3; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
  .tag-festival, .tag-athletic { background: var(--bg-warning); color: var(--text-warning); }
  .tag-arts, .tag-entertainment { background: var(--bg-info); color: var(--text-info); }
  .tag-nature, .tag-market { background: var(--bg-success); color: var(--text-success); }
  .tag-cultural, .tag-civic { background: var(--bg-danger); color: var(--text-danger); }
  .meta-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .event-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .event-footer { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
  .btn-cal, .btn-link { font-size: 11px; padding: 5px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-med); background: var(--bg); color: var(--text); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: background 0.15s; cursor: pointer; }
  .btn-cal:hover, .btn-link:hover { background: var(--bg-secondary); }
  .free-badge { font-size: 11px; margin-left: auto; color: var(--text-success); font-weight: 500; display: flex; align-items: center; gap: 3px; }
  .empty { text-align: center; padding: 4rem 1rem; color: var(--text-secondary); font-size: 14px; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); font-size: 13px; padding: 8px 18px; border-radius: var(--radius-pill); background: var(--bg-success); color: var(--text-success); border: 0.5px solid var(--border-success); display: none; align-items: center; gap: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); z-index: 100; }
  .toast.show { display: inline-flex; }
  .upload-bar { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 0.85rem 1.1rem; margin-bottom: 1rem; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .upload-label { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border-med); background: var(--bg); color: var(--text); cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .upload-label:hover { background: var(--bg-secondary); }
  .upload-label input[type=file] { display: none; }
  .upload-preview { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); flex: 1; min-width: 0; }
  .upload-preview img { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; border: 0.5px solid var(--border-med); flex-shrink: 0; }
  .upload-preview span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--text-secondary); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 600px) {
    .header-row { flex-direction: column; }
    .search-wrap { margin-left: 0; }
    .search-wrap input { width: 100%; }
  }
</style>

<body>

<div class="header">
  <div class="header-row">
    <div>
      <h1><i class="ti ti-building-community"></i> Chicago family events</h1>
      <p>Family-friendly things to do in Chicago — add any event to your Google Calendar in one click</p>
    </div>
    <div class="header-actions">
      <button onclick="exportICS()" class="btn-export"><i class="ti ti-calendar-down"></i> Export all to calendar (.ics)</button>
      <button onclick="loadEventbrite()" id="refresh-btn"><i class="ti ti-refresh"></i> Refresh live events</button>
    </div>
  </div>
</div>

<div class="url-bar">
  <i class="ti ti-link icon"></i>
  <input type="text" id="url-input" placeholder="Paste an event page URL or social media post link..." />
  <button onclick="scrapeUrl()">Add event ↗</button>
</div>

<div class="upload-bar">
  <i class="ti ti-photo icon"></i>
  <label class="upload-label">
    <i class="ti ti-upload" style="font-size:15px"></i> Upload screenshot or flyer
    <input type="file" id="img-upload" accept="image/*" onchange="previewImage(this)" />
  </label>
  <div class="upload-preview" id="upload-preview">
    <span style="color:var(--text-tertiary)">Instagram reels, flyers, screenshots — upload any image with event info</span>
  </div>
  <button onclick="extractFromImage()" id="img-btn" style="display:none">Extract events ↗</button>
</div>

<div class="ai-bar">
  <i class="ti ti-sparkles icon"></i>
  <input type="text" id="ai-input" placeholder='Try "free events in July" or "outdoor music for kids"' />
  <button onclick="runAISearch()">Search ↗</button>
</div>

<div class="controls" id="filter-bar">
  <button class="filter-btn" data-filter="all" onclick="setFilter('all',this)"><i class="ti ti-layout-grid"></i>All</button>
  <button class="filter-btn" data-filter="athletic" onclick="setFilter('athletic',this)"><i class="ti ti-run"></i>Athletic</button>
  <button class="filter-btn" data-filter="market" onclick="setFilter('market',this)"><i class="ti ti-basket"></i>Markets</button>
  <button class="filter-btn" data-filter="civic" onclick="setFilter('civic',this)"><i class="ti ti-heart-handshake"></i>Civic & service</button>
  <button class="filter-btn" data-filter="entertainment" onclick="setFilter('entertainment',this)"><i class="ti ti-music"></i>Entertainment</button>
  <button class="filter-btn" data-filter="festival" onclick="setFilter('festival',this)"><i class="ti ti-confetti"></i>Festivals</button>
  <button class="filter-btn" data-filter="arts" onclick="setFilter('arts',this)"><i class="ti ti-palette"></i>Arts</button>
  <button class="filter-btn" data-filter="nature" onclick="setFilter('nature',this)"><i class="ti ti-leaf"></i>Nature</button>
  <button class="filter-btn" data-filter="cultural" onclick="setFilter('cultural',this)"><i class="ti ti-globe"></i>Cultural</button>
  <button class="filter-btn" data-filter="free" onclick="setFilter('free',this)"><i class="ti ti-ticket"></i>Free only</button>
</div>

<div class="second-row">
  <div class="neighborhood-wrap">
    <i class="ti ti-map map-icon"></i>
    <select id="neighborhood-select" onchange="renderCards()" aria-label="Filter by neighborhood">
      <option value="">All neighborhoods</option>
    </select>
    <i class="ti ti-chevron-down chev-icon"></i>
  </div>
  <span class="results-count" id="results-count"></span>
  <div class="search-wrap">
    <i class="ti ti-search search-icon"></i>
    <input type="text" id="text-search" placeholder="Search events..." oninput="renderCards()" />
  </div>
</div>

<div class="legend">
  <span class="legend-item"><span class="dot"></span>Curated</span>
  <span class="legend-item"><span class="dot dot-eb"></span>From Eventbrite</span>
  <span class="legend-item"><span class="dot dot-scraped"></span>URL-added</span>
</div>

<div id="status-bar" class="status-bar"></div>
<div id="cards-container" class="events-grid"></div>

<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toast-msg"></span></div>

let liveEvents = [];
let scrapedEvents = [];
let activeFilter = 'all';

function allEvents() {
  const seen = new Set();
  return [...CURATED, ...liveEvents, ...scrapedEvents].filter(e => {
    const k = e.name.toLowerCase().trim();
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });
}

const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_NAMES_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function nextOccurrence(e) {
  const today = new Date(); today.setHours(0,0,0,0);
  const endDate = new Date((e.dateEnd||e.date)+'T00:00:00');
  if (!e.recurDays || !e.recurDays.length) {
    const start = new Date(e.date+'T00:00:00');
    return start >= today ? start : null;
  }
  // Find next occurrence on one of the recur days, between today and end date
  const candidate = new Date(today);
  for (let i = 0; i < 14; i++) {
    if (e.recurDays.includes(candidate.getDay()) && candidate <= endDate) return new Date(candidate);
    candidate.setDate(candidate.getDate()+1);
  }
  return null;
}

function formatDisplayDate(e) {
  const next = nextOccurrence(e);
  if (!next) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  const dayName = DAY_NAMES[next.getDay()];
  const dateStr = next.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if (next.getTime()===today.getTime()) return `Today, ${dateStr}`;
  if (next.getTime()===tomorrow.getTime()) return `Tomorrow, ${dateStr}`;
  return `${dayName}, ${dateStr}`;
}

function guessTag(name, desc) {
  const t = (name+' '+desc).toLowerCase();
  if (/run|race|5k|marathon|mud|obstacle|fitness|yoga|walk|jog|bike/.test(t)) return 'athletic';
  if (/market|farm|vendor|produce|artisan/.test(t)) return 'market';
  if (/cleanup|volunteer|civic|march|rally|service/.test(t)) return 'civic';
  if (/concert|music|movie|film|perform|show|dance|comedy|theater|theatre/.test(t)) return 'entertainment';
  if (/festival|fest|fair|food|taste/.test(t)) return 'festival';
  if (/art|gallery|craft|paint/.test(t)) return 'arts';
  if (/nature|garden|hike|trail|forest/.test(t)) return 'nature';
  if (/culture|cultural|heritage|juneteenth|pride/.test(t)) return 'cultural';
  return 'festival';
}

function ebCatToTag(id) {
  return {'103':'entertainment','105':'entertainment','110':'festival','113':'cultural','108':'arts'}[id] || 'festival';

async function loadEventbrite() {
  if (EB_TOKEN === 'PASTE_YOUR_NEW_TOKEN_HERE') {
    setStatus('⚠️ Add your Eventbrite token to the HTML file to enable live events.');
    return;
  }
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = '<span class="spinner"></span> Loading…';
  btn.disabled = true;
  setStatus('<span class="spinner"></span> Fetching live events from Eventbrite…');
  try {
    const now = new Date().toISOString().split('.')[0]+'Z';
    const urls = [
      `https://www.eventbriteapi.com/v3/events/search/?location.address=Chicago,IL&location.within=15mi&q=family+kids&start_date.range_start=${now}&expand=venue,ticket_classes&page_size=50`,
      `https://www.eventbriteapi.com/v3/events/search/?location.address=Chicago,IL&location.within=15mi&categories=1,103,110&start_date.range_start=${now}&expand=venue,ticket_classes&page_size=50`
    ];
    const results = await Promise.all(urls.map(u => fetch(u,{headers:{Authorization:`Bearer ${EB_TOKEN}`}}).then(r=>r.json())));
    const seen = new Set(CURATED.map(e=>e.name.toLowerCase().trim()));
    const fresh = [];
    results.forEach(data => {
      (data.events||[]).forEach(ev => {
        const k = ev.name?.text?.toLowerCase().trim();
        if (!k||seen.has(k)) return;
        seen.add(k);
        const isFree = ev.is_free||ev.ticket_classes?.every(t=>t.free);
        const v = ev.venue;
        const hood = v?.address?.city==='Chicago'?(v?.address?.localized_area_display||'Chicago'):(v?.address?.city||'Chicago');
        const sd = ev.start?.local?.split('T')[0];
        const ed = ev.end?.local?.split('T')[0];
        if (!sd) return;
        fresh.push({
          name:ev.name?.text||'Untitled',
          date:sd, dateEnd:ed!==sd?ed:null,
          time:ev.start?.local?new Date(ev.start.local).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'TBD',
          location:v?`${v.name||''}, ${v.address?.city||'Chicago'}`.replace(/^, /,''):'Chicago',
          neighborhood:hood,
          tag:ebCatToTag(ev.category_id)||guessTag(ev.name?.text||'',ev.description?.text||''),
          free:!!isFree, source:'eventbrite', url:ev.url,
          desc:(ev.description?.text||ev.summary||'').slice(0,200)
        });
      });
    });
    liveEvents = fresh;
    setStatus(`✓ Loaded ${fresh.length} live events from Eventbrite`);
    populateNeighborhoods(); renderCards();
  } catch(e) {
    setStatus('⚠️ Couldn\'t reach Eventbrite — showing curated events only');
  }
  btn.innerHTML = '<i class="ti ti-refresh"></i> Refresh live events';
  btn.disabled = false;
}

// Score an event by how much info it has (for dedup)
function eventScore(e) {
  let s = 0;
  if (e.name) s += 2;
  if (e.date) s += 3;
  if (e.time && e.time !== 'TBD') s += 2;
  if (e.location && e.location.length > 5) s += 2;
  if (e.neighborhood && e.neighborhood !== 'Chicago') s += 1;
  if (e.desc && e.desc.length > 40) s += 2;
  if (e.url) s += 1;
  if (e.free !== undefined) s += 1;
  return s;
}

// Normalize event name for dedup comparison
function normalizeName(n) {
  return (n||'').toLowerCase().replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();
}

// Merge incoming events, keeping richest version of duplicates
function mergeEvents(incoming, source, sourceUrl) {
  incoming.forEach(ev => {
    ev.source = ev.source || source;
    if (sourceUrl && !ev.url) ev.url = sourceUrl;
    const key = normalizeName(ev.name);
    // Check against curated
    const curatedMatch = CURATED.find(c => normalizeName(c.name) === key);
    if (curatedMatch) return; // never override curated
    // Check against existing scraped
    const existIdx = scrapedEvents.findIndex(e => normalizeName(e.name) === key);
    if (existIdx >= 0) {
      if (eventScore(ev) > eventScore(scrapedEvents[existIdx])) {
        scrapedEvents[existIdx] = ev; // replace with richer version
      }
    } else {
      scrapedEvents.push(ev);
    }
    // Check against live Eventbrite events
    const liveIdx = liveEvents.findIndex(e => normalizeName(e.name) === key);
    if (liveIdx >= 0) {
      if (eventScore(ev) > eventScore(liveEvents[liveIdx])) {
        liveEvents[liveIdx] = ev;
      }
    }
  });
}

const EXTRACT_SYSTEM = `You are a Chicago family events extractor. Extract ALL events mentioned and return ONLY a JSON array. Each event object must have: name, date (YYYY-MM-DD or null if unknown), dateEnd (YYYY-MM-DD or null), time (human readable or "TBD"), location (venue + city), neighborhood (Chicago neighborhood name, "Suburbs", or "Citywide"), tag (festival|arts|nature|cultural|athletic|market|civic|entertainment), free (boolean, default false if unknown), desc (2-3 sentence summary). If the source lists multiple events, return all of them as separate objects. Return ONLY valid JSON array, no markdown, no explanation.`;

  setStatus('<span class="spinner"></span> Reading page — extracting events…');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:2000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system: EXTRACT_SYSTEM,
        messages:[{role:'user',content:`Extract all Chicago family events from this URL: ${url}`}]
      })
    });
    const data = await res.json();
    const text = data.content.find(b=>b.type==='text')?.text||'';
    const clean = text.replace(/```json|```/g,'').trim();
    const events = JSON.parse(clean);
    const arr = Array.isArray(events) ? events : [events];
    mergeEvents(arr, 'scraped', url);
    document.getElementById('url-input').value='';
    populateNeighborhoods(); renderCards();

    setStatus('');
  } catch(e) {
    setStatus('⚠️ Couldn\'t extract events — try a different URL');
  }
}

function formatICSDate(dateStr, isEnd) {
  const d = new Date(dateStr+'T00:00:00');
  if (isEnd) d.setDate(d.getDate()+1);
  return d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
}

function escapeICS(str) {
  return (str||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}

const ICAL_DAYS = ['SU','MO','TU','WE','TH','FR','SA'];

function eventDescription(e) {
  let d = e.desc || '';
  if (e.imageUrl) d += '\n\n📷 Source image: ' + e.imageUrl;
  if (e.url) d += '\n\nMore info: ' + e.url;
  return d;
}

async function uploadToImgbb(base64Data, mimeType) {
  if (!IMGBB_KEY || IMGBB_KEY === 'PASTE_YOUR_IMGBB_KEY_HERE') return null;
  try {
    const form = new FormData();
    form.append('image', base64Data);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
      method: 'POST', body: form
    });
    const data = await res.json();
    return data?.data?.url || null;
  } catch { return null; }
}

function exportICS() {
  const events = getFiltered();
  if (!events.length) { showToast('No events to export'); return; }

  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Chicago Family Events//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];

  events.forEach(e => {
    const uid = `${e.date}-${e.name.toLowerCase().replace(/\s+/g,'-')}@chicago-family-events`;
    const next = nextOccurrence(e);
    if (!next) return;
    const pad = n=>String(n).padStart(2,'0');
    const fmtDate = d=>`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
    const startStr = fmtDate(next);
    const endD = new Date(next); endD.setDate(endD.getDate()+1);
    const endStr = fmtDate(endD);
    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${uid}`);
    lines.push(`DTSTAMP:${new Date().toISOString().replace(/[-:]/g,'').split('.')[0]}Z`);
    lines.push(`DTSTART;VALUE=DATE:${startStr}`);
    lines.push(`DTEND;VALUE=DATE:${endStr}`);
    lines.push(`SUMMARY:${escapeICS(e.name)}`);
    lines.push(`DESCRIPTION:${escapeICS(eventDescription(e))}`);
    lines.push(`LOCATION:${escapeICS(e.location)}`);
    if (e.url) lines.push(`URL:${e.url}`);
    if (e.imageUrl) lines.push(`ATTACH;FMTTYPE=image/jpeg:${e.imageUrl}`);
    if (e.recurDays && e.recurDays.length && e.dateEnd) {
      const byDay = e.recurDays.map(d=>ICAL_DAYS[d]).join(',');
      const until = e.dateEnd.replace(/-/g,'');
      lines.push(`RRULE:FREQ=WEEKLY;BYDAY=${byDay};UNTIL=${until}`);
    }
    lines.push('END:VEVENT');
  });

  lines.push('END:VCALENDAR');

  const icsContent = lines.join('\r\n');
  const dataUri = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(icsContent);
  const hood = document.getElementById('neighborhood-select').value;
  const filterLabel = activeFilter !== 'all' ? `-${activeFilter}` : '';
  const hoodLabel = hood ? `-${hood.toLowerCase().replace(/\s+/g,'-')}` : '';
  const filename = `chicago-family-events${filterLabel}${hoodLabel}.ics`;
  // Try modern download approach first, fall back to data URI
  try {
    const blob = new Blob([icsContent], {type:'text/calendar;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 100);
  } catch(e) {
    // Fallback: open in new tab so user can save manually
    const a = document.createElement('a');
    a.href = dataUri;
    a.download = filename;
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
  showToast(`Exported ${events.length} events to calendar`);
}

function buildGCalUrl(e) {
  const next = nextOccurrence(e);
  if (!next) return '#';
  const pad = n=>String(n).padStart(2,'0');
  const fmtDate = d=>`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
  const start = fmtDate(next);
  const endD = new Date(next); endD.setDate(endD.getDate()+1);
  const end = fmtDate(endD);
  let recur = '';
  if (e.recurDays && e.recurDays.length && e.dateEnd) {
    const byDay = e.recurDays.map(d=>ICAL_DAYS[d]).join(',');
    const until = e.dateEnd.replace(/-/g,'');
    recur = `&recur=RRULE:FREQ%3DWEEKLY%3BBYDAY%3D${byDay}%3BUNTIL%3D${until}`;
  }
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(e.name)}&dates=${start}/${end}&details=${encodeURIComponent(eventDescription(e))}&location=${encodeURIComponent(e.location)}${recur}&sf=true&output=xml`;
}

function getFiltered() {
  const search = document.getElementById('text-search').value.toLowerCase();
  const hood = document.getElementById('neighborhood-select').value;
  return allEvents().filter(e=>{
    if (!nextOccurrence(e)) return false;
    const matchFilter = activeFilter==='all'?true:activeFilter==='free'?e.free:e.tag===activeFilter;
    const matchHood = !hood||e.neighborhood===hood;
    const matchSearch = !search||e.name.toLowerCase().includes(search)||e.desc.toLowerCase().includes(search)||e.location.toLowerCase().includes(search);
    return matchFilter&&matchHood&&matchSearch;
  }).sort((a,b)=>{
    const na = nextOccurrence(a), nb = nextOccurrence(b);
    return na-nb;
  });
}

function populateNeighborhoods() {

  sel.innerHTML = hoods.map(h=>`<option value="${h}">${h||'All neighborhoods'}</option>`).join('');
  if (hoods.includes(cur)) sel.value=cur;

function renderCards() {

    container.innerHTML='<div class="empty"><div style="font-size:32px;margin-bottom:8px">📅</div>No events match. Try a different filter or neighborhood.</div>';
    return;
  }
  container.innerHTML = filtered.map(e=>{
    const displayDate = formatDisplayDate(e);
    const isRecurring = !!e.recurDays && e.recurDays.length > 0;
    const seasonEnd = e.dateEnd ? new Date(e.dateEnd+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : null;
    const cardClass = e.source==='eventbrite'?'event-card eb-card':e.source==='scraped'?'event-card scraped-card':'event-card';
    return `<div class="${cardClass}">
      <div class="event-top">
        <div class="event-name">${e.name}</div>
        <span class="tag tag-${e.tag}">${TAG_LABELS[e.tag]||e.tag}</span>
      </div>
      <div class="event-meta">
        <div class="meta-row"><i class="ti ti-calendar" style="font-size:13px"></i>${displayDate}${isRecurring && seasonEnd ? ` <span style="color:var(--text-tertiary);margin-left:2px">(through ${seasonEnd})</span>` : ''}</div>
        <div class="meta-row"><i class="ti ti-clock" style="font-size:13px"></i>${e.time}</div>
        <div class="meta-row"><i class="ti ti-map-pin" style="font-size:13px"></i>${e.location}</div>
      </div>
      <div class="event-desc">${e.desc}</div>
      ${e.imageUrl ? `<div style="margin-top:6px"><a href="${e.imageUrl}" target="_blank"><img src="${e.imageUrl}" alt="Source image" style="width:100%;max-height:120px;object-fit:cover;border-radius:6px;border:0.5px solid var(--border-med);" /></a></div>` : ''}
      ${e.url ? `<div class="meta-row" style="margin-top:4px"><i class="ti ti-link" style="font-size:13px"></i><a href="${e.url}" target="_blank" style="color:var(--text-info);font-size:12px;text-decoration:none;">${(() => { try { return new URL(e.url).hostname.replace('www.',''); } catch { return e.url; } })()}</a></div>` : ''}
      <div class="event-footer">
        <a class="btn-cal" href="${buildGCalUrl(e)}" target="_blank">
          <i class="ti ti-calendar-plus" style="font-size:13px"></i>Add to Google Calendar
        </a>
        ${e.free?'<span class="free-badge"><i class="ti ti-ticket" style="font-size:12px"></i> Free</span>':''}
      </div>
    </div>`;
  }).join('');
}

document.getElementById('ai-input').addEventListener('keydown',e=>{if(e.key==='Enter')runAISearch();});
document.getElementById('url-input').addEventListener('keydown',e=>{if(e.key==='Enter')scrapeUrl();});
document.querySelector('[data-filter="all"]').className='filter-btn active-all';
populateNeighborhoods();
renderCards();
loadEventbrite();
</script>
</body>
</html>
